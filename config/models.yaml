# Model Configuration and Hyperparameter Search Spaces

models:
  # Baseline models (existing)
  baseline:
    enabled: true
    models:
      - logistic_regression
      - random_forest
      - extra_trees

    logistic_regression:
      max_iter: 3000
      class_weight: balanced
      solver: lbfgs
      random_state: 42

    random_forest:
      n_estimators: 350
      max_depth: 18
      min_samples_leaf: 2
      class_weight: balanced_subsample
      random_state: 42
      n_jobs: -1

    extra_trees:
      n_estimators: 500
      max_depth: 20
      min_samples_leaf: 2
      class_weight: balanced_subsample
      random_state: 42
      n_jobs: -1

  # New gradient boosting models (NEW)
  gradient_boosting:
    enabled: true
    models:
      - xgboost
      - lightgbm
      - catboost

    xgboost:
      n_estimators: 200
      max_depth: 7
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      scale_pos_weight: 1
      random_state: 42
      n_jobs: -1
      objective: multi:softprob
      num_class: 3

    lightgbm:
      n_estimators: 200
      max_depth: 10
      num_leaves: 31
      learning_rate: 0.05
      min_child_samples: 10
      feature_fraction: 0.8
      bagging_fraction: 0.8
      random_state: 42
      n_jobs: -1
      class_weight: balanced

    catboost:
      depth: 8
      iterations: 200
      learning_rate: 0.05
      l2_leaf_reg: 5
      verbose: 0
      random_state: 42

# Hyperparameter tuning configuration
tuning:
  enabled: true
  method: random  # Options: random, grid
  cv_splits: 5
  test_size: 0.2
  scoring_metric: f1_macro  # Primary metric
  secondary_metrics:
    - accuracy
    - log_loss
  n_iter: 100
  random_state: 42
  verbose: 1

  # Search spaces for RandomSearchCV
  search_spaces:
    xgboost:
      max_depth: [3, 5, 7, 10]
      learning_rate: [0.01, 0.05, 0.1]
      n_estimators: [50, 100, 200, 300]
      subsample: [0.6, 0.8, 0.9, 1.0]
      colsample_bytree: [0.6, 0.8, 0.9, 1.0]
      min_child_weight: [1, 3, 5]
      reg_alpha: [0, 0.1, 1]
      reg_lambda: [0, 0.1, 1]

    lightgbm:
      max_depth: [5, 7, 10, 15, -1]
      learning_rate: [0.01, 0.05, 0.1]
      n_estimators: [50, 100, 200, 300]
      num_leaves: [15, 31, 63, 127]
      min_child_samples: [5, 10, 20]
      feature_fraction: [0.6, 0.8, 1.0]
      bagging_fraction: [0.6, 0.8, 1.0]

    catboost:
      depth: [4, 6, 8, 10]
      learning_rate: [0.01, 0.05, 0.1]
      iterations: [100, 200, 300]
      l2_leaf_reg: [1, 3, 5, 10]
      bagging_temperature: [0, 0.5, 1.0]

    random_forest:
      n_estimators: [100, 200, 350, 500]
      max_depth: [10, 15, 18, 20, 25, None]
      min_samples_leaf: [1, 2, 4]
      min_samples_split: [2, 5, 10]
      max_features: [sqrt, log2, None]

    extra_trees:
      n_estimators: [200, 350, 500, 700]
      max_depth: [15, 18, 20, 25, None]
      min_samples_leaf: [1, 2, 4]
      bootstrap: [true, false]

# Ensemble configuration
ensembles:
  stacking:
    enabled: true
    base_models: [xgboost, lightgbm, extra_trees, catboost]
    meta_model: logistic_regression
    use_proba: true

  voting:
    enabled: true
    models: [xgboost, lightgbm, extra_trees, catboost]
    weights: [1.0, 1.0, 1.0, 1.0]
    voting: soft  # Options: soft (probabilities), hard (class predictions)

# Training configuration
training:
  random_state: 42
  n_jobs: -1
  verbose: 1
  save_model: true
  model_save_path: models/football_bi/

# Evaluation configuration
evaluation:
  metrics:
    - accuracy
    - precision_macro
    - recall_macro
    - f1_macro
    - f1_weighted
    - log_loss
    - confusion_matrix
  per_class_metrics: true
  plot_confusion_matrix: true
  plot_feature_importance: true
